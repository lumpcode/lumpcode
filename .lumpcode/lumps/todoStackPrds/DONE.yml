- name: fix-in-start-run-no-double-lump-launch
  task: >-
    If when the daemon ticks, the previous lump did not end, and we begin a new run on the same branchWorkspacePath, we can have collision.
    We need to add a log to when it is the case, and wait for the current running lump on branchWorkspacePath to end.
    If we use the run command and not the start command, just fail with a message saying to wait.
  priority: 1
  dependsOn: []
